# ─────────────────────────────────────────────────────────────────────
#  STEP 4 — a THREE-tier app, all wired together by Compose.
#
#      browser ──▶ frontend (Next.js) ──▶ api (Express) ──▶ redis
#                  port 3000              port 4000          port 6379
#
#  Key idea: the browser only talks to "frontend". The cross-service
#  call (frontend → api → redis) happens INSIDE Docker's private network,
#  where service names ("api", "redis") work as hostnames.
#
#  Start:  docker compose up --build
#  Stop:   docker compose down
# ─────────────────────────────────────────────────────────────────────

services:
  # ── Service #1: the Next.js frontend (what the user sees) ──
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"               # Mac's 3000 → container's 3000 (open in browser)
    environment:
      # Where the Next.js SERVER finds the API (service name, not localhost!).
      API_URL: ${API_URL}
      # Make file-watching reliable inside Docker on macOS, so hot reload works.
      WATCHPACK_POLLING: "true"
    depends_on:
      - api
    volumes:
      - ./frontend:/app           # live code: your Mac folder → container
      - /app/node_modules         # keep the container's installed modules
      - /app/.next                # keep the container's build cache

  # ── Service #2: our API (the backend) ──
  api:
    build: ./api
    environment:
      REDIS_URL: ${REDIS_URL}     # where the API finds Redis (service name)
    command: npm run dev          # dev override → nodemon live reload
    depends_on:
      - redis
    volumes:
      - ./api:/app                # live code
      - /app/node_modules         # protect container's node_modules
    # No published port needed — only the Next.js server calls the API,
    # privately over Docker's network. Uncomment to poke it from your Mac:
    # ports:
    #   - "4000:4000"

  # ── Service #3: Redis (ready-made image, stores the count) ──
  redis:
    image: redis:7
    volumes:
      - redis-data:/data          # named volume → the count survives restarts

# Named volume declaration (where Redis persists its data).
volumes:
  redis-data:
