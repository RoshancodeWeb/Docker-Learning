services:

   frontend:
      build: ./frontend
      ports:
        - "3000:3000"
      environment:
        API_URL: ${API_URL}
        WATCHPACK_POLLING: "true"
      depends_on:
        - backend
      volumes:
        - ./frontend:/app
        - /app/node_modules
        - /app/.next 

   backend:
      build: ./backend
      environment:
        REDIS_URL: ${REDIS_URL}
      command: npm run dev
      depends_on:
         - redis
      volumes:
         - ./backend:/app
         - /app/node_modules
      



      

   redis:
      image: redis:7
      volumes:
        - redis-data:/data
    
volumes: 
    redis-data:


      
         
